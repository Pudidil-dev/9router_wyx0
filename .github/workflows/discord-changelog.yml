name: Announce WYx0 Changelog to Discord

on:
  workflow_dispatch:
    inputs:
      update_label:
        description: "WYx0 update label, e.g. 0.4.80-1"
        required: true
        default: "0.4.80-1"
      prefix:
        description: "Optional label before title, e.g. UPDATE, HOTFIX UPDATE, FEATURE UPDATE"
        required: false
        default: "UPDATE"
      new_items:
        description: "One item per line for [NEW]"
        required: false
        default: ""
      improvement_items:
        description: "One item per line for [IMPROVEMENT]"
        required: false
        default: ""
      fix_items:
        description: "One item per line for [FIX]"
        required: false
        default: ""
      extra_notes:
        description: "Optional freeform notes shown before the update command"
        required: false
        default: ""
      mention_everyone:
        description: "Mention @everyone at the top of the message"
        required: false
        type: boolean
        default: true
      update_command:
        description: "Command users should run to update"
        required: false
        default: "npm update -g wyxrouter"
      color:
        description: "Unused legacy field kept for compatibility"
        required: false
        default: "5814783"

permissions:
  contents: read

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Discord webhook secret
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::Missing DISCORD_WEBHOOK_URL secret. Add it in repository Settings > Secrets and variables > Actions."
            exit 1
          fi
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Send Discord announcement
        run: |
          node <<'NODE'
          async function main() {
            const webhookUrl = process.env.DISCORD_WEBHOOK_URL;
            const updateLabel = process.env.UPDATE_LABEL.trim();
            const prefix = process.env.PREFIX.trim();
            const newItems = process.env.NEW_ITEMS;
            const improvementItems = process.env.IMPROVEMENT_ITEMS;
            const fixItems = process.env.FIX_ITEMS;
            const extraNotes = process.env.EXTRA_NOTES.trim();
            const mentionEveryone = String(process.env.MENTION_EVERYONE).toLowerCase() === "true";
            const updateCommand = process.env.UPDATE_COMMAND.trim();


            if (!webhookUrl) {
              console.error("Missing DISCORD_WEBHOOK_URL secret.");
              process.exit(1);
            }

            if (!updateLabel) {
              console.error("update_label input is required.");
              process.exit(1);
            }

            const formatBulletBlock = (label, raw) => {
              const items = String(raw || "")
                .split(/\r?\n/)
                .map((line) => line.trim())
                .filter(Boolean);
              if (items.length === 0) return "";
              return [`[${label}]`, ...items.map((item) => `• ${item}`)].join("\n");
            };

            const sections = [
              formatBulletBlock("NEW", newItems),
              formatBulletBlock("IMPROVEMENT", improvementItems),
              formatBulletBlock("FIX", fixItems),
            ].filter(Boolean);

            if (sections.length === 0 && !extraNotes && !updateCommand) {
              console.error("Provide at least one changelog section, extra note, or update command.");
              process.exit(1);
            }

            const descriptionParts = [];
            if (sections.length > 0) descriptionParts.push(sections.join("\n\n"));
            if (extraNotes) descriptionParts.push(extraNotes);
            if (updateCommand) descriptionParts.push(["run", `\`${updateCommand}\``].join("\n"));

            const formattedUpdateLabel = updateLabel.startsWith("v") ? updateLabel : `v${updateLabel}`;
            const heading = [prefix, formattedUpdateLabel].filter(Boolean).join(" ");
            const messageLines = [];
            if (mentionEveryone) messageLines.push("@everyone");
            messageLines.push(heading);
            messageLines.push("");
            messageLines.push(descriptionParts.join("\n\n"));

            const payload = {
              username: "9Router WYx0",
              content: messageLines.join("\n").trim(),
              allowed_mentions: mentionEveryone ? { parse: ["everyone"] } : { parse: [] },
            };

            const response = await fetch(webhookUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            if (!response.ok) {
              const body = await response.text();
              console.error(`Discord webhook failed: ${response.status} ${response.statusText}`);
              console.error(body.slice(0, 1000));
              process.exit(1);
            }

            console.log(`Announced ${updateLabel} to Discord.`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          UPDATE_LABEL: ${{ inputs.update_label }}
          PREFIX: ${{ inputs.prefix }}
          NEW_ITEMS: ${{ inputs.new_items }}
          IMPROVEMENT_ITEMS: ${{ inputs.improvement_items }}
          FIX_ITEMS: ${{ inputs.fix_items }}
          EXTRA_NOTES: ${{ inputs.extra_notes }}
          MENTION_EVERYONE: ${{ inputs.mention_everyone }}
          UPDATE_COMMAND: ${{ inputs.update_command }}
          COLOR: ${{ inputs.color }}
